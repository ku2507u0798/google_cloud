<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registry Terminal | System Admin</title>
    <style>
        :root {
            --bg-pitch: #050505;
            --accent-gold: #FFB800;
            --card-glass: rgba(15, 15, 15, 0.9);
            --border-muted: rgba(255, 184, 0, 0.1);
            --text-dim: #666;
        }

        body {
            font-family: 'Helvetica Neue', sans-serif;
            background: var(--bg-pitch);
            background-image: radial-gradient(circle at 50% 0%, #111 0%, transparent 50%);
            color: #fff;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .admin-container {
            width: 100%;
            max-width: 900px;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
        }

        .back-link:hover {
            color: var(--accent-gold);
            border-bottom-color: var(--accent-gold);
        }

        h2 {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-glass);
            border: 1px solid var(--border-muted);
            padding: 20px;
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 24px;
            color: var(--accent-gold);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-container {
            background: var(--card-glass);
            border: 1px solid var(--border-muted);
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #0A0A0A;
            color: var(--text-dim);
            text-align: left;
            padding: 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #1a1a1a;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid #111;
            color: #ccc;
            transition: 0.3s;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td {
            background: rgba(255, 184, 0, 0.02);
            color: #fff;
        }

        .event-tag {
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 12px;
        }

        .error-msg {
            padding: 40px;
            text-align: center;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="nav-header">
        <a href="index.html" class="back-link">← Terminal Exit</a>
        <h2>Registry Dashboard</h2>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-val" id="countTotal">0</span>
            <span class="stat-label">Total Entries</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" style="color: #fff;">LIVE</span>
            <span class="stat-label">System Status</span>
        </div>
        <div class="stat-card">
            <span class="stat-val">2026</span>
            <span class="stat-label">Event Year</span>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Participant</th>
                    <th>Contact</th>
                    <th>Event Selection</th>
                </tr>
            </thead>
            <tbody id="registrationTable">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function loadRegistrations() {
        try {
            const response = await fetch('http://127.0.0.1:5000/get_registrations');
            if (!response.ok) throw new Error("Stream Failed");

            const data = await response.json();
            const tableBody = document.getElementById('registrationTable');
            tableBody.innerHTML = ''; 

            if (Array.isArray(data)) {
                document.getElementById('countTotal').innerText = data.length;

                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3" class="error-msg">NO RECORDS FOUND IN DATABASE</td></tr>';
                    return;
                }

                data.forEach(user => {
                    const row = `<tr>
                        <td>
                            <div style="color: #fff; font-weight: 500;">${user.full_name}</div>
                            <div style="font-size: 11px; color: #555; margin-top: 4px;">ID: ${Math.random().toString(36).substr(2, 6).toUpperCase()}</div>
                        </td>
                        <td>
                            <div>${user.email}</div>
                            <div style="font-size: 12px; color: #444;">${user.phone}</div>
                        </td>
                        <td class="event-tag">${user.event_name}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            }
        }
        catch (error) {
            console.error(error);
            document.getElementById('registrationTable').innerHTML = '<tr><td colspan="3" class="error-msg">OFFLINE: UNABLE TO REACH DATA SERVER</td></tr>';
        }
    }

    window.onload = loadRegistrations;
</script>

</body>
</html>
